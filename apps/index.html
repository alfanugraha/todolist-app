<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoList App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-yellow-200 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white border-4 border-black w-full max-w-md p-6" style="box-shadow: 6px 6px 0px #000;">
    <h1 class="text-3xl font-black text-black uppercase mb-6 border-b-4 border-black pb-2">Daftar Tugas</h1>

    <!-- Input tambah task -->
    <div class="flex gap-2 mb-4">
      <input
        type="text"
        id="task-input"
        placeholder="Masukkan deskripsi tugas baru..."
        aria-label="Deskripsi tugas baru"
        class="flex-1 border-2 border-black px-3 py-2 font-bold focus:outline-none focus:ring-0 focus:border-black"
        style="box-shadow: 3px 3px 0px #000;"
      />
      <button id="add-btn" class="bg-pink-300 border-2 border-black px-4 py-2 font-black uppercase hover:bg-pink-400" style="box-shadow: 3px 3px 0px #000;">Tambah</button>
    </div>

    <!-- Tombol filter -->
    <div id="filter-container" class="flex gap-2 mb-4"></div>

    <!-- Daftar task -->
    <ul id="task-list" class="mb-4"></ul>

    <!-- Pesan kosong -->
    <p id="empty-message" hidden></p>

    <!-- Tombol hapus selesai -->
    <div class="flex justify-end">
      <button id="clear-completed-btn">Hapus Selesai</button>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
